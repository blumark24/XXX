name: Blumark24 Pages Upgrade

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  upgrade-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject production assets
        run: |
          python3 << 'PY'
          from pathlib import Path
          index = Path('index.html')
          if not index.exists():
              raise SystemExit('index.html not found')

          content = index.read_text(encoding='utf-8')

          css = '<link rel="stylesheet" href="assets/css/blumark24-upgrade.css?v=2">'
          js = '<script defer src="assets/js/blumark24-upgrade.js?v=2"></script>'

          if 'blumark24-upgrade.css' not in content:
              content = content.replace('</head>', f'  {css}\n  {js}\n</head>')

          index.write_text(content, encoding='utf-8')
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
