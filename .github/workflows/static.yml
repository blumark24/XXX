name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Patch production index
        run: |
          python3 - << 'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          css = '<link rel="stylesheet" href="assets/css/blumark24-upgrade.css?v=10">'
          js = '<script defer src="assets/js/blumark24-upgrade.js?v=10"></script>'
          if 'assets/css/blumark24-upgrade.css' not in s:
              s = s.replace('</head>', css + '\n' + js + '\n</head>')
          elif 'assets/js/blumark24-upgrade.js' not in s:
              s = s.replace('</head>', js + '\n</head>')
          p.write_text(s, encoding='utf-8')
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
